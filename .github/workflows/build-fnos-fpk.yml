name: build-fnos-fpk

# Build the fnOS (飞牛 fnOS) .fpk packages for x86 and arm.
#
# Builds the Go binary from source (frontend embedded via //go:embed),
# packages it with the official fnpack tool, and attaches the .fpk files
# plus a SHA256SUMS audit log to the published release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Target Release Tag (e.g. 0.0.1 or 0.0.1-alpha)'
        required: false
        type: string

permissions:
  contents: write

env:
  FNPACK_VERSION: '1.2.3'
  FNPACK_SHA256: '54b97fa7b70968c4d05c79840f5daeff508957d0bb2062fdb0376d00d9615c93'
  FNS_BIN_NAME: fast-note-sync-service

jobs:
  build:
    name: Build .fpk (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: amd64, target: build-linux-amd64, build_dir: linux_amd64, platform: x86, suffix: x86 }
          - { goarch: arm64, target: build-linux-arm64, build_dir: linux_arm64, platform: arm, suffix: arm }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: ver
        run: |
          set -eu
          TAG_NAME="${{ inputs.tag_name || github.event.release.tag_name }}"
          if [ -n "$TAG_NAME" ]; then
            VER="$TAG_NAME"
          else
            VER=$(grep -E 'Version\s+string' internal/app/version.go | awk -F '"' '{print $2}')
          fi
          VER="${VER#v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "version=${VER}"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binary via Makefile
        run: |
          set -eu
          mkdir -p scripts/fnos/app
          make ${{ matrix.target }}
          cp "build/${{ matrix.build_dir }}/${FNS_BIN_NAME}" "scripts/fnos/app/${FNS_BIN_NAME}"

      - name: Stamp manifest
        run: |
          set -eu
          VER="${{ steps.ver.outputs.version }}"
          sed -i "s|^version=.*|version=\"${VER}\"|" scripts/fnos/manifest
          sed -i "s|^platform=.*|platform=\"${{ matrix.platform }}\"|" scripts/fnos/manifest
          cat scripts/fnos/manifest

      - name: Download fnpack (pinned SHA256)
        run: |
          set -eu
          curl -fL --retry 3 -o scripts/fnos/fnpack \
            "https://static2.fnnas.com/fnpack/fnpack-${FNPACK_VERSION}-linux-amd64"
          echo "${FNPACK_SHA256}  scripts/fnos/fnpack" | sha256sum -c -
          chmod +x scripts/fnos/fnpack

      - name: Build .fpk
        run: |
          cd scripts/fnos
          ./fnpack build --directory .

      - name: Rename & checksum
        run: |
          set -eu
          VER="${{ steps.ver.outputs.version }}"
          cd scripts/fnos
          FPK_NAME="${FNS_BIN_NAME}-${VER}-fnOS-${{ matrix.suffix }}.fpk"
          mv fastnotesync.fpk "${FPK_NAME}"
          sha256sum "${FPK_NAME}" > "${FPK_NAME}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: fpk-${{ matrix.suffix }}
          path: |
            scripts/fnos/*.fpk
            scripts/fnos/*.fpk.sha256
          if-no-files-found: error

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          TARGET_TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          if [ -z "$TARGET_TAG" ]; then
            VER_VAL="${{ steps.ver.outputs.version }}"
            if gh release view "$VER_VAL" >/dev/null 2>&1; then
              TARGET_TAG="$VER_VAL"
            elif gh release view "v${VER_VAL}" >/dev/null 2>&1; then
              TARGET_TAG="v${VER_VAL}"
            fi
          fi

          if [ -n "$TARGET_TAG" ] && gh release view "$TARGET_TAG" >/dev/null 2>&1; then
            echo "Uploading artifacts to release: ${TARGET_TAG}"
            cd scripts/fnos
            gh release upload "${TARGET_TAG}" *.fpk *.fpk.sha256 --clobber
          else
            echo "Skipping upload: Target release '${TARGET_TAG}' not found."
          fi

      - name: Attach to CNB release
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_REPO: haierkeys/fast-note-sync-service
        run: |
          set -e
          if [ -z "${CNB_TOKEN}" ]; then
            echo "CNB_TOKEN not set, skipping CNB upload."
            exit 0
          fi

          TARGET_TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          if [ -z "$TARGET_TAG" ]; then
            TARGET_TAG="${{ steps.ver.outputs.version }}"
          fi

          echo "Fetching CNB Release for tag: ${TARGET_TAG}"
          LIST_RESPONSE=$(curl -s \
            -H "Accept: application/vnd.cnb.api+json" \
            -H "Authorization: Bearer ${CNB_TOKEN}" \
            "https://api.cnb.cool/${CNB_REPO}/-/releases")
          
          RELEASE_ID=$(echo "$LIST_RESPONSE" | jq -r ".[] | select(.tag_name==\"${TARGET_TAG}\") | .id")

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            ALT_TAG="v${TARGET_TAG#v}"
            if [ "$ALT_TAG" = "$TARGET_TAG" ]; then
              ALT_TAG="${TARGET_TAG#v}"
            fi
            RELEASE_ID=$(echo "$LIST_RESPONSE" | jq -r ".[] | select(.tag_name==\"${ALT_TAG}\") | .id")
          fi

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "::warning::CNB Release for tag ${TARGET_TAG} not found, skipping CNB asset upload."
            exit 0
          fi

          echo "Found CNB Release ID: ${RELEASE_ID}"

          for FILE_PATH in scripts/fnos/*.fpk scripts/fnos/*.fpk.sha256; do
            [ -f "$FILE_PATH" ] || continue
            FILE_NAME=$(basename "$FILE_PATH")
            FILE_SIZE=$(stat -c%s "$FILE_PATH")

            echo "Uploading ${FILE_NAME} to CNB Release..."

            UPLOAD_RESPONSE=$(curl -s -X POST \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Authorization: Bearer ${CNB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg name "${FILE_NAME}" \
                --argjson size ${FILE_SIZE} \
                '{asset_name: $name, size: $size, overwrite: true}')" \
              "https://api.cnb.cool/${CNB_REPO}/-/releases/${RELEASE_ID}/asset-upload-url")

            UPLOAD_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.upload_url')
            VERIFY_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.verify_url')

            if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
              echo "::warning::Failed to get upload URL for ${FILE_NAME} from CNB"
              continue
            fi

            CONTENT_TYPE="application/octet-stream"
            if [[ "${FILE_NAME}" == *.txt ]] || [[ "${FILE_NAME}" == *.sha256 ]]; then
              CONTENT_TYPE="text/plain"
            fi

            UPLOAD_RESULT=$(curl -s -w "\n%{http_code}" -X PUT \
              -H "Content-Type: ${CONTENT_TYPE}" \
              --data-binary @"$FILE_PATH" \
              "$UPLOAD_URL")
            UPLOAD_HTTP_CODE=$(echo "$UPLOAD_RESULT" | tail -1)

            if [ "$UPLOAD_HTTP_CODE" -eq 200 ] || [ "$UPLOAD_HTTP_CODE" -eq 201 ]; then
              CONFIRM_RESULT=$(curl -s -w "\n%{http_code}" -X POST \
                -H "Accept: application/vnd.cnb.api+json" \
                -H "Authorization: Bearer ${CNB_TOKEN}" \
                "${VERIFY_URL}")
              echo "✅ ${FILE_NAME} uploaded to CNB successfully"
            else
              echo "::warning::Failed to upload ${FILE_NAME} to CNB (HTTP ${UPLOAD_HTTP_CODE})"
            fi
          done
